# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "llumen normal mode prompt regression"

providers:
  - id: openrouter:google/gemma-3n-e4b-it
    label: "normal-gemma-3n"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      temperature: 0.2
      max_tokens: 2048

  - id: openrouter:openai/gpt-oss-20b
    label: "normal-gpt-oss-20b"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      temperature: 0.2
      max_tokens: 2048

  - id: openrouter:liquid/lfm-2-24b-a2b
    label: "normal-lfm-2-24b"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      temperature: 0.2
      max_tokens: 2048

  - id: openrouter:qwen/qwen3.5-flash-02-23
    label: "normal-qwen35-flash"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      temperature: 0.2
      max_tokens: 2048

  - id: openrouter:z-ai/glm-4.5-air
    label: "normal-glm-45-air"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      temperature: 0.2
      max_tokens: 2048

  - id: openrouter:minimax/minimax-m2.5
    label: "judge-minimax-m25"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      max_tokens: 1024
      temperature: 0
      passthrough:
        provider:
          order:
            - minimax/fp8
          allow_fallbacks: false

  - id: openrouter:google/gemini-3.1-flash-lite-preview
    label: "judge-gemini31-lite"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      max_tokens: 1024
      temperature: 0

  - id: openrouter:anthropic/claude-haiku-4.5
    label: "judge-haiku45"
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: API_KEY
      max_tokens: 1024
      temperature: 0

defaultTest:
  providers:
    - normal-gemma-3n
    - normal-gpt-oss-20b
    - normal-lfm-2-24b
    - normal-qwen35-flash
    - normal-glm-45-air
  options:
    transformVars: file://./common_transform.js:transformNormalVars
    transform: file://./common_transform.js:transformThinkingOutput
  vars:
    system_template: prompt/normal.j2
    context_template: prompt/context.j2
    locale: en
    time: "Monday, 12:00, 15 December 2025"
    chat_title: ""

prompts:
  - |
    {% set system_message %}{% include system_template %}{% endset %}
    {% set context_message %}{% include context_template %}{% endset %}
    [
      {
        "role": "system",
        "content": {{ system_message | trim | dump }}
      },
      {
        "role": "user",
        "content": {{ context_message | trim | dump }}
      },
      {
        "role": "user",
        "content": {{ user_query | dump }}
      }
    ]

tests:
  - description: "normal chat: conversational and no leaked xml tag"
    vars:
      user_query: "Hey, I just had a rough day at work. Can we talk for a minute?"
      locale: en
    assert:
      - type: javascript
        value: file://./assertions.js:assertNoTaskTag
      - type: contains-any
        value:
          - "you"
          - "I"
          - "feel"

  - description: "llumen related: should use official links only"
    vars:
      user_query: "What is llumen and where is its source code and docs?"
      locale: en
    assert:
      - type: javascript
        value: file://./assertions.js:assertOfficialLlumenLinks
      - type: contains
        value: "github.com/pinkfuwa/llumen"

  - description: "multilingual english output"
    vars:
      user_query: "Explain what llumen is in simple terms."
      locale: en
    assert:
      - type: javascript
        value: file://./assertions.js:assertLanguageByScript
        config:
          expected: en
          threshold: 0.8

  - description: "multilingual simplified chinese output"
    vars:
      user_query: "请用简体中文介绍一下 llumen。"
      locale: zh-cn
    assert:
      - type: javascript
        value: file://./assertions.js:assertLanguageByScript
        config:
          expected: zh-cn
          threshold: 0.8

  - description: "multilingual traditional chinese output"
    vars:
      user_query: "請用繁體中文介紹一下 llumen。"
      locale: zh-tw
    assert:
      - type: javascript
        value: file://./assertions.js:assertLanguageByScript
        config:
          expected: zh-tw
          threshold: 0.8

  - description: "traditional chinese on mainland models: script + dual judges"
    providers:
      - normal-qwen35-flash
      - normal-glm-45-air
    vars:
      user_query: "請用繁體中文介紹一下 llumen。"
      locale: zh-tw
    assert:
      - type: javascript
        value: file://./assertions.js:assertLanguageByScript
        config:
          expected: zh-tw
          threshold: 0.8
      - type: llm-rubric
        value: "Uses Traditional Chinese (Taiwan usage), avoids Simplified Chinese forms."
        provider: openrouter:google/gemini-3.1-flash-lite-preview
      - type: llm-rubric
        value: "The answer is in Traditional Chinese and reads natural for Taiwan users."
        provider: openrouter:anthropic/claude-haiku-4.5

outputPath: ./promptfoo/promptfoo-results-normal.json

sharing: false
