# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "llumen title generation prompt regression"

providers:
  - id: openrouter:google/gemma-3n-e4b-it
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 256
      temperature: 0.2

  - id: openrouter:openai/gpt-oss-20b
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 256
      temperature: 0.2

  - id: openrouter:liquid/lfm-2-24b-a2b
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 256
      temperature: 0.2

  - id: openrouter:qwen/qwen3.5-flash-02-23
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 256
      temperature: 0.2

  - id: openrouter:z-ai/glm-4.5-air
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 256
      temperature: 0.2

  - id: openrouter:google/gemma-4-26b-a4b-it
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 256
      temperature: 0.2

  - id: openrouter:google/gemini-3.1-flash-lite-preview
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 256
      temperature: 0.2

  - id: openrouter:minimax/minimax-m2.5
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      showThinking: false
      max_tokens: 1024
      temperature: 0
      passthrough:
        provider:
          order:
            - minimax/fp8
          allow_fallbacks: false

defaultTest:
  options:
    transformVars: file://./common_transform.js:transformTitleVars
    transform: file://./common_transform.js:transformTitleOutput
  vars:
    system_template: file://../prompt/title_generation.j2
    locale: en

derivedMetrics:
  - name: token
    value: |
      function(namedScores, evalStep) {
        return evalStep.tokensUsed?.prompt || 0;
      }

prompts:
  - |
    [
      {
        "role": "system",
        "content": {{ system_template | trim | dump }}
      },
      {
        "role": "user",
        "content": {{ user_query | dump }}
      },
      {% if assistant_truncated %}
      {
        "role": "assistant",
        "content": {{ assistant_truncated | dump }}
      },
      {% endif %}
      {
        "role": "user",
        "content": {{ user_prefix | dump }}
      }
    ]

tests:
  - description: "title generation english"
    vars:
      user_query: "What is the capital of France?"
      agent_answer: "Paris is the capital city of France, famous for culture and landmarks."
      locale: en
    assert:
      - type: javascript
        value: file://./assertions.js:assertTitleFormat
      - type: llm-rubric
        provider: openrouter:minimax/minimax-m2.5
        value: |
          Check if this title is a concise chat title:
          - starts with exactly one emoji and one space
          - single line only
          - in English
          - reflects the user query and assistant answer
          Return pass only if all are satisfied.

  - description: "title generation simplified chinese"
    vars:
      user_query: "什么是机器学习?"
      agent_answer: "机器学习是人工智能的一个分支，重点是让系统从数据中学习。"
      locale: zh-cn
    assert:
      - type: javascript
        value: file://./assertions.js:assertTitleFormat
      - type: llm-rubric
        provider: openrouter:minimax/minimax-m2.5
        value: |
          Judge this title:
          - one emoji prefix
          - concise and single-line
          - Simplified Chinese
          - semantically matches the conversation

  - description: "title generation traditional chinese"
    vars:
      user_query: "台灣夜市有什麼必吃美食？"
      agent_answer: "台灣夜市常見美食包含鹽酥雞、蚵仔煎與珍珠奶茶。"
      locale: zh-tw
    assert:
      - type: javascript
        value: file://./assertions.js:assertTitleFormat
      - type: javascript
        value: file://./assertions.js:assertLanguageByScript
        config:
          expected: zh-tw
          threshold: 0.8

  - description: "title generation traditional chinese with different language"
    vars:
      user_query: "How to write openocd config?"
      agent_answer: 'Writing an OpenOCD configuration file can feel a bit intimidating at first, but it usually follows a very logical pattern. Instead of writing everything from scratch, the standard practice is to "stack" existing scripts for your debug probe and your target chip.'
      locale: zh-tw
    assert:
      - type: javascript
        value: file://./assertions.js:assertTitleFormat
      - type: javascript
        value: file://./assertions.js:assertLanguageByScript
        config:
          expected: zh-tw
          threshold: 0.8

outputPath: ./.promptfoo/promptfoo-results-title.json

sharing: false
